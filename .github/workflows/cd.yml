name: CD

on:
  push:
    branches:
      - main

permissions:
  id-token: write   # required for OIDC
  contents: read

env:
  AWS_REGION:      eu-central-1
  ECR_REPOSITORY:  supplychain360

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Authenticate to AWS via OIDC (no long-lived keys) ────────────────
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          #role-to-assume:    ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: sc360-cd-${{ github.run_id }}
          aws-region:        ${{ env.AWS_REGION }}

      # ── Log in to ECR ─────────────────────────────────────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Build, tag, push ──────────────────────────────────────────────────
      - name: Build and push Docker image
        id: build
        env:
          REGISTRY:   ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:  ${{ github.sha }}
        run: |
          IMAGE_URI="${REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          LATEST_URI="${REGISTRY}/${ECR_REPOSITORY}:latest"

          docker build \
            --build-arg BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --build-arg GIT_SHA="${IMAGE_TAG}" \
            -t "${IMAGE_URI}" \
            -t "${LATEST_URI}" \
            .

          docker push "${IMAGE_URI}"
          docker push "${LATEST_URI}"

          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"
          echo "Image pushed: ${IMAGE_URI}"

      # ── Pull secrets from Secrets Manager and update SSM parameter ────────
      # (Kubernetes / ECS can reference this parameter for the image to deploy)
      - name: Update latest-image SSM parameter
        env:
          IMAGE_URI: ${{ steps.build.outputs.image_uri }}
        run: |
          aws ssm put-parameter \
            --name "/supplychain360/latest-image" \
            --value "${IMAGE_URI}" \
            --type String \
            --overwrite

      - name: Summary
        run: |
          echo "### CD complete :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "Image: ${{ steps.build.outputs.image_uri }}" >> $GITHUB_STEP_SUMMARY