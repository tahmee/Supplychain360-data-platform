version: 2

sources:
  - name: raw_s3
    database: SUPPLYCHAIN360_DB
    schema: RAW
    description: "Raw tables loaded from S3 via Snowflake external stage (Parquet)."
    tables:
      - name: inventory
        description: "Daily warehouse inventory snapshots ingested from S3."
        columns:
          - name: warehouse_id
            tests: [not_null]
          - name: product_id
            tests: [not_null]
          - name: snapshot_date
            tests: [not_null]

      - name: shipments
        description: "Daily shipment records ingested from S3."
        columns:
          - name: shipment_id
            tests: [not_null, unique]

      - name: products
        description: "Product reference data (full refresh monthly)."
        columns:
          - name: product_id
            tests: [not_null, unique]

      - name: warehouses
        description: "Warehouse reference data (full refresh monthly)."
        columns:
          - name: warehouse_id
            tests: [not_null, unique]

      - name: suppliers
        description: "Supplier reference data (full refresh monthly)."
        columns:
          - name: supplier_id
            tests: [not_null, unique]

  - name: raw_postgres
    database: SUPPLYCHAIN360_DB
    schema: RAW
    description: "Daily sales transaction tables ingested from Supabase."
    tables:
      - name: sales
        description: >
          Union-all view over all sales_YYYY_MM_DD partitioned tables.
          Created by the macro generate_sales_union.
        columns:
          - name: transaction_id
            tests: [not_null, unique]
          - name: store_id
            tests: [not_null]
          - name: product_id
            tests: [not_null]

  - name: raw_gsheet
    database: SUPPLYCHAIN360_DB
    schema: RAW
    description: "Store location data ingested from Google Sheets monthly."
    tables:
      - name: gsheet
        description: "Store locations and metadata."
        columns:
          - name: store_id
            tests: [not_null, unique]