version: 2

models:
  - name: stg_sales
    description: "Cleaned and proper typed sales transactions from Supabase."
    columns:
      - name: transaction_id
        tests: [not_null, unique]
      - name: store_id
        tests: [not_null]
      - name: product_id
        tests: [not_null]
      - name: quantity_sold
        tests: [not_null]
      - name: sale_amount
        tests: [not_null]
      - name: transaction_date
        tests: [not_null]

  - name: stg_shipments
    description: "Cleaned shipment records from S3."
    columns:
      - name: shipment_id
        tests: [not_null, unique]
      - name: warehouse_id
        tests: [not_null]
      - name: store_id
        tests: [not_null]
      - name: product_id
        tests: [not_null]

  - name: stg_inventory
    description: "Daily inventory snapshots from S3."
    columns:
      - name: warehouse_id
        tests: [not_null]
      - name: product_id
        tests: [not_null]
      - name: snapshot_date
        tests: [not_null]

  - name: stg_products
    description: "Product reference data."
    columns:
      - name: product_id
        tests: [not_null, unique]

  - name: stg_warehouses
    description: "Warehouse reference data."
    columns:
      - name: warehouse_id
        tests: [not_null, unique]

  - name: stg_suppliers
    description: "Supplier reference data."
    columns:
      - name: supplier_id
        tests: [not_null, unique]

  - name: stg_stores
    description: "Store location data from Google Sheets."
    columns:
      - name: store_id
        tests: [not_null, unique]